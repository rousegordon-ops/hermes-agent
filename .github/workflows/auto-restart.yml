name: Auto-restart Railway on code change

# Replaces Railway's "rebuild on every push" with a smarter trigger:
#   - skill-only change → no-op (already live via volume symlinks)
#   - code change       → railway redeploy (no rebuild, ~30s, no cost)
#   - dep/Docker change → log and skip (you trigger rebuild manually)
#
# Requires:
#   - Repo secret RAILWAY_TOKEN (project-scoped to pretty-amazement)
#   - Railway dashboard: disable "auto-deploy on push" so we own the trigger
#
# Service ID is baked in (not a secret — just identifies the resource).

on:
  push:
    branches: [main]

jobs:
  classify-and-act:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Determine action based on changed paths
        id: classify
        run: |
          set -e

          if [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            echo "verb=rebuild" >> "$GITHUB_OUTPUT"
            echo "reason=initial branch push" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed=$(git diff --name-only "${{ github.event.before }}" "${{ github.event.after }}" || echo "")
          echo "Changed files:"
          echo "$changed"
          echo ""

          # Dependency / Docker / CI changes — needs a real rebuild
          if echo "$changed" | grep -qE '^(Dockerfile|docker/|pyproject\.toml|package(-lock)?\.json|requirements.*\.txt|\.github/|uv\.lock|MANIFEST\.in|setup\.(py|cfg))'; then
            echo "verb=rebuild" >> "$GITHUB_OUTPUT"
            echo "reason=dependency or build config touched" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # If anything outside skills/ changed → restart
          if echo "$changed" | grep -vqE '^(skills/|website/|docs/|tests/|\.gitignore|.*\.md$)'; then
            echo "verb=restart" >> "$GITHUB_OUTPUT"
            echo "reason=code change outside skills/" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "verb=noop" >> "$GITHUB_OUTPUT"
          echo "reason=skill-only or doc-only change" >> "$GITHUB_OUTPUT"

      - name: Restart Railway (no rebuild)
        if: steps.classify.outputs.verb == 'restart'
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          echo "Reason: ${{ steps.classify.outputs.reason }}"
          npm install -g @railway/cli@latest
          railway redeploy --service c32be0a9-9d43-49a8-bf43-764915360dfb --yes

      - name: Skip — skill or docs only
        if: steps.classify.outputs.verb == 'noop'
        run: |
          echo "Reason: ${{ steps.classify.outputs.reason }}"
          echo "Skill changes are live immediately via the volume symlink. No action needed."

      - name: Skip — needs manual rebuild
        if: steps.classify.outputs.verb == 'rebuild'
        run: |
          echo "Reason: ${{ steps.classify.outputs.reason }}"
          echo "Dependencies or Docker config changed — a full rebuild is required."
          echo "Trigger one manually: railway up --service hermes-agent"
          echo "Or push to a deploy-trigger branch that Railway watches."
